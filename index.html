        document.addEventListener('mousedown', (e) => {
            if (this.inputMode !== 'keyboard' || !this.active || this.settingsOpen || this.inventoryOpen) return;
            if (e.button === 0) { this.mouseDownState.left = true; this.startMining(); }
            if (e.button === 2) { this.mouseDownState.right = true; this.handlePlace(); }
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) { this.mouseDownState.left = false; this.stopMining(); }
            if (e.button === 2) { this.mouseDownState.right = false; }
        });
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        document.addEventListener('mousemove', (e) => {
            if (this.inputMode !== 'keyboard' || !this.active || this.settingsOpen || this.inventoryOpen) return;
            const movementX = e.movementX || 0;
            const movementY = e.movementY || 0;
            const sens = 0.0022 * this.mouseSensitivity;
            this.euler.y -= movementX * sens;
            this.euler.x -= movementY * sens;
            this.euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.euler.x));
            this.camera.quaternion.setFromEuler(this.euler);
        });
    }

    initTouchControls() {
        const lookZone = document.getElementById('lookZone');
        const joystickZone = document.getElementById('joystickZone');
        const joystickStick = document.getElementById('joystickStick');
        const jumpBtn = document.getElementById('jumpBtn');
        const flyUpBtn = document.getElementById('flyUpBtn');
        const flyDownBtn = document.getElementById('flyDownBtn');
        const breakBtn = document.getElementById('breakBtn');
        const placeBtn = document.getElementById('placeBtn');

        let lookTouchId = null;
        let lastLookX = 0, lastLookY = 0;

        lookZone.addEventListener('touchstart', (e) => {
            if (!this.active || this.inventoryOpen) return;
            const t = e.changedTouches[0];
            lookTouchId = t.identifier;
            lastLookX = t.clientX;
            lastLookY = t.clientY;
        }, { passive: true });

        lookZone.addEventListener('touchmove', (e) => {
            if (!this.active || this.inventoryOpen) return;
            for (const t of e.changedTouches) {
                if (t.identifier !== lookTouchId) continue;
                const dx = t.clientX - lastLookX;
                const dy = t.clientY - lastLookY;
                lastLookX = t.clientX;
                lastLookY = t.clientY;

                const sens = 0.0035 * this.touchSensitivity;
                this.euler.y -= dx * sens;
                this.euler.x -= dy * sens;
                this.euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.euler.x));
                this.camera.quaternion.setFromEuler(this.euler);
            }
            e.preventDefault();
        }, { passive: false });

        const clearLook = (e) => {
            for (const t of e.changedTouches) if (t.identifier === lookTouchId) lookTouchId = null;
        };
        lookZone.addEventListener('touchend', clearLook);
        lookZone.addEventListener('touchcancel', clearLook);

        let joystickTouchId = null;
        const joystickRect = () => joystickZone.getBoundingClientRect();
        const maxRadius = 45;

        // Forward (stick pushed up / -y screen) should map to virtualMove.y = +1 (forward).
        // Directly clamp the raw dx/dy vector to maxRadius without an atan2->cos/sin
        // round trip (the round trip added floating point error and, near dx=dy=0,
        // could snap to an unstable angle - this was the source of the diagonal-move bug
        // where pushing up-right would occasionally register as up-left).
        const updateStick = (dx, dy) => {
            const dist = Math.hypot(dx, dy);
            let sx = dx, sy = dy;
            if (dist > maxRadius) {
                const scale = maxRadius / dist;
                sx = dx * scale;
                sy = dy * scale;
            }
            joystickStick.style.transform = `translate(${sx}px, ${sy}px)`;
            this.player.virtualMove.x = sx / maxRadius;
            this.player.virtualMove.y = -sy / maxRadius;
        };

        const resetStick = () => {
            joystickStick.style.transform = 'translate(0px, 0px)';
            if (this.player) { this.player.virtualMove.x = 0; this.player.virtualMove.y = 0; }
        };

        joystickZone.addEventListener('touchstart', (e) => {
            if (!this.active || this.inventoryOpen) return;
            const t = e.changedTouches[0];
            joystickTouchId = t.identifier;
            const rect = joystickRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            updateStick(t.clientX - cx, t.clientY - cy);
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!this.active || this.inventoryOpen) return;
            const rect = joystickRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            for (const t of e.changedTouches) {
                if (t.identifier !== joystickTouchId) continue;
                updateStick(t.clientX - cx, t.clientY - cy);
            }
            e.preventDefault();
        }, { passive: false });

        const clearJoystick = (e) => {
            for (const t of e.changedTouches) {
                if (t.identifier === joystickTouchId) { joystickTouchId = null; resetStick(); }
            }
        };
        joystickZone.addEventListener('touchend', clearJoystick);
        joystickZone.addEventListener('touchcancel', clearJoystick);

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (this.inventoryOpen) return;
            jumpBtn.classList.add('active-touch');
            if (this.player) this.player.virtualJump = true;
        }, { passive: false });
        jumpBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            jumpBtn.classList.remove('active-touch');
            if (this.player) this.player.virtualJump = false;
        });

        const bindHold = (btn, onDown, onUp) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (this.inventoryOpen) return;
                btn.classList.add('active-touch');
                onDown();
            }, { passive: false });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active-touch');
                onUp();
            });
            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('active-touch');
                onUp();
            });
        };

        bindHold(flyUpBtn, () => { if (this.player) this.player.virtualFlyUp = true; }, () => { if (this.player) this.player.virtualFlyUp = false; });
        bindHold(flyDownBtn, () => { if (this.player) this.player.virtualFlyDown = true; }, () => { if (this.player) this.player.virtualFlyDown = false; });

        // Break = long-press (touch only): a short hold delay must elapse
        // before mining actually starts, so a quick tap does nothing.
        // Place = single tap (handled in bindHold's onDown, fires once).
        const BREAK_HOLD_DELAY = 300; // ms
        let breakHoldTimer = null;
        bindHold(
            breakBtn,
            () => {
                clearTimeout(breakHoldTimer);
                breakHoldTimer = setTimeout(() => this.startMining(), BREAK_HOLD_DELAY);
            },
            () => {
                clearTimeout(breakHoldTimer);
                this.stopMining();
            }
        );
        bindHold(placeBtn, () => this.handlePlace(), () => {});

        // show/hide fly buttons depending on mode
        this.flyUpBtn = flyUpBtn;
        this.flyDownBtn = flyDownBtn;
    }

    /* ---------- raycasting ---------- */
    castBlockRay() {
        this.raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
        const origin = this.raycaster.ray.origin;
        const dir = this.raycaster.ray.direction;

        const step = 0.05;
        for (let t = 0; t < this.raycaster.far; t += step) {
            const px = origin.x + dir.x * t, py = origin.y + dir.y * t, pz = origin.z + dir.z * t;
            const bx = Math.floor(px), by = Math.floor(py), bz = Math.floor(pz);

            if (this.world.isSolid(bx, by, bz)) {
                const prevT = Math.max(t - step, 0);
                const ppx = origin.x + dir.x * prevT, ppy = origin.y + dir.y * prevT, ppz = origin.z + dir.z * prevT;
                return { hit: [bx, by, bz], place: [Math.floor(ppx), Math.floor(ppy), Math.floor(ppz)] };
            }
        }
        return null;
    }

    /* ---------- mining with animation/time ---------- */
    startMining() {
        if (!this.active || this.settingsOpen || this.inventoryOpen || (this.player && this.player.dead)) return;
        const result = this.castBlockRay();
        if (!result) { this.mining = null; return; }
        const [x, y, z] = result.hit;
        const type = this.world.getBlock(x, y, z);
        const baseTime = MINE_TIME[type];
        if (baseTime === undefined) { this.mining = null; return; } // e.g. water, unbreakable

        // creative mode = instant break
        const timeNeeded = this.player.mode === 'creative' ? 0 : baseTime;

        this.mining = { x, y, z, type, progress: 0, timeNeeded };
        if (timeNeeded <= 0) {
            this.finishMining();
        }
    }

    stopMining() {
        this.mining = null;
        this.clearMiningCells();
        this.miningRing.style.display = 'none';
    }

    clearMiningCells() {
        if (!this.miningCells) return;
        for (const cell of this.miningCells) cell.classList.remove('on', 'dim');
    }

    updateMining(dt) {
        if (!this.mining) { this.clearMiningCells(); this.miningRing.style.display = 'none'; return; }

        // re-verify target still valid & still aimed at (simple: re-raycast each frame while holding)
        const result = this.castBlockRay();
        if (!result || result.hit[0] !== this.mining.x || result.hit[1] !== this.mining.y || result.hit[2] !== this.mining.z) {
            this.mining = null;
            this.clearMiningCells();
            this.miningRing.style.display = 'none';
            return;
        }

        this.mining.progress += dt;
        const pct = Math.min(1, this.mining.progress / Math.max(this.mining.timeNeeded, 0.0001));
        this.miningRing.style.display = 'grid';
        this.renderMiningCells(pct);

        if (this.mining.progress >= this.mining.timeNeeded) {
            this.finishMining();
        }
    }

    renderMiningCells(pct) {
        const total = this.miningCells.length;
        const revealCount = Math.floor(pct * total);
        const partial = pct * total - revealCount; // fractional progress on the next cell
        for (let i = 0; i < total; i++) {
            const cell = this.miningCells[this.miningCellOrder[i]];
            cell.classList.remove('on', 'dim');
            if (i < revealCount) {
                cell.classList.add('on');
            } else if (i === revealCount && partial > 0.35) {
                cell.classList.add('on', 'dim');
            }
        }
    }

    finishMining() {
        if (!this.mining) return;
        const { x, y, z, type } = this.mining;
        this.world.setBlock(x, y, z, BlockType.AIR);
        this.mesher.rebuildDirty();

        if (this.player.mode === 'survival') {
            const dropType = BLOCK_DROP[type];
            if (dropType !== null && dropType !== undefined) {
                const dropPos = new THREE.Vector3(x + 0.5, y + 0.5, z + 0.5);
                const drop = new ItemDrop(this.scene, dropType, dropPos);
                this.drops.push(drop);
            } else if (type === BlockType.LEAVES) {
                // small chance nothing drops (matches typical leaf behavior); skip
            }
        }

        this.mining = null;
        this.clearMiningCells();
        this.miningRing.style.display = 'none';
    }

    /* ---------- placing ---------- */
    handlePlace() {
        if (!this.active || this.settingsOpen || this.inventoryOpen || (this.player && this.player.dead)) return;
        const result = this.castBlockRay();
        if (!result) return;
        const [x, y, z] = result.place;
        if (this.world.isSolid(x, y, z)) return;

        const px = Math.floor(this.camera.position.x);
        const py = Math.floor(this.camera.position.y - this.player.eyeHeight);
        const pz = Math.floor(this.camera.position.z);
        if (x === px && z === pz && (y === py || y === py + 1)) return;

        if (this.player.mode === 'creative') {
            const type = this.inventory.getSelectedType();
            if (type === null || type === undefined) return;
            this.world.setBlock(x, y, z, type);
            this.mesher.rebuildDirty();
        } else {
            const stack = this.inventory.getSelectedStack();
            if (!stack) return;
            this.world.setBlock(x, y, z, stack.type);
            this.mesher.rebuildDirty();
            this.inventory.consumeSelected();
        }
    }

    /* ---------- item pickup ---------- */
    updateDrops(dt) {
        const playerPos = this.camera.position;
        for (let i = this.drops.length - 1; i >= 0; i--) {
            const drop = this.drops[i];
            drop.update(dt, this.world);

            const dist = drop.mesh.position.distanceTo(playerPos);
            if (drop.age > 0.4 && dist < 1.3) {
                this.inventory.addItem(drop.type, 1);
                drop.dispose();
                this.drops.splice(i, 1);
            }
        }
    }

    /* ---------- resize / loop ---------- */
    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    start() { this.animate(); }

    animate() {
        requestAnimationFrame(this.animate);
        const dt = Math.min(this.clock.getDelta(), 0.1);

        if (this.active && this.player && !this.inventoryOpen) {
            this.player.update(dt, this.controls);
            this.updateDrops(dt);

            const holdingBreak = (this.inputMode === 'keyboard' && this.mouseDownState.left);
            if (holdingBreak && !this.mining) this.startMining();
            this.updateMining(dt);
        }

        this.renderer.render(this.scene, this.camera);
    }
}

const engine = new Engine();
engine.start();

</script>
